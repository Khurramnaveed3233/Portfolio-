<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:#1a0b2e;
    overflow-x:hidden;
}

/* HERO */
.hero {
    position:relative;
    background:linear-gradient(135deg,#5c00a3,#2b004e);
    padding:80px 10% 120px;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* SOCIAL */
.social-links {
    position:absolute;
    top:30px;
    left:10%;
}
.social-links a {
    color:#d1b3ff;
    font-size:1.5rem;
    margin-right:20px;
}
.social-links a:hover { color:#fff; }

/* TEXT */
.quote-container { flex:1.2; }
.quote-text {
    font-family:'Playfair Display',serif;
    font-size:2.2rem;
    font-style:italic;
    color:#e0d1ff;
}
.author { font-size:1.3rem; margin:10px 0; }

.otw-badge {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(209,179,255,0.5);
    border-radius:50px;
    padding:8px 18px;
    margin:15px 0;
}
.otw-dot {
    width:9px;height:9px;
    background:#4ade80;
    border-radius:50%;
}

.cta-row {
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.btn-primary {
    background:#fff;
    color:#2b004e;
    padding:11px 24px;
    border-radius:6px;
    font-weight:700;
    text-decoration:none;
}

.btn-outline {
    border:1.5px solid rgba(209,179,255,0.6);
    color:#d1b3ff;
    padding:11px 24px;
    border-radius:6px;
    text-decoration:none;
}

/* IMAGE */
.image-container {
    flex:0.8;
    display:flex;
    justify-content:flex-end;
}
.img-outer-ring {
    width:320px;height:320px;
    border-radius:50%;
    border:12px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
}
.profile-img {
    width:275px;height:275px;
    border-radius:50%;
    object-fit:cover;
}

/* NAV */
nav {
    background:#1a0b2e;
    padding:18px 0;
}
nav ul {
    list-style:none;
    display:flex;
    justify-content:center;
    gap:30px;
}
nav a {
    color:#d1b3ff;
    text-decoration:none;
    font-weight:700;
}
nav a:hover { color:#fff; }

/* CONTENT */
.main-content {
    padding:100px 10%;
    text-align:center;
}

/* ✅ MOBILE FIX */
@media (max-width:768px){

.hero {
    flex-direction:column;
    text-align:center;
    padding:60px 20px;
}

.social-links {
    position:static;
    margin-bottom:20px;
}

.image-container {
    justify-content:center;
    margin-top:30px;
}

.img-outer-ring {
    width:220px;height:220px;
}

.profile-img {
    width:180px;height:180px;
}

.quote-text {
    font-size:1.5rem;
}

nav ul {
    flex-direction:column;
    gap:15px;
}

.cta-row {
    justify-content:center;
}

}
</style>
</head>
