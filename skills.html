<style>

/* ===================================================== */
/* PREMIUM ICON DESIGN */
/* ===================================================== */

.card-icon {

    width: 95px;
    height: 95px;

    border-radius: 28px;

    display: flex;

    align-items: center;
    justify-content: center;

    margin-bottom: 30px;

    position: relative;

    overflow: hidden;

    border: 1px solid rgba(255,255,255,0.08);

    backdrop-filter: blur(18px);

    transition: 0.4s ease;
}

/* glow effect */

.card-icon::before {

    content: '';

    position: absolute;

    inset: 0;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.08),
            transparent
        );

    opacity: 0;
    transition: 0.4s;
}

.analytics-card:hover .card-icon::before {

    opacity: 1;
}

/* logos */

.card-icon img {

    width: 46px;
    height: 46px;

    object-fit: contain;

    position: relative;

    z-index: 2;
}

/* insights icon */

.insights-icon i {

    font-size: 2.3rem;

    color: #fff;

    position: relative;

    z-index: 2;
}

/* excel */

.excel-icon {

    background:
        linear-gradient(
            145deg,
            rgba(34,197,94,0.28),
            rgba(34,197,94,0.08)
        );

    box-shadow:
        0 0 35px rgba(34,197,94,0.18);
}

/* sql */

.sql-icon {

    background:
        linear-gradient(
            145deg,
            rgba(192,132,252,0.28),
            rgba(124,58,237,0.08)
        );

    box-shadow:
        0 0 35px rgba(192,132,252,0.18);
}

/* power bi */

.pbi-icon {

    background:
        linear-gradient(
            145deg,
            rgba(242,200,17,0.28),
            rgba(242,200,17,0.08)
        );

    box-shadow:
        0 0 35px rgba(242,200,17,0.18);
}

/* insights */

.insights-icon {

    background:
        linear-gradient(
            145deg,
            rgba(192,132,252,0.28),
            rgba(124,58,237,0.08)
        );

    box-shadow:
        0 0 35px rgba(192,132,252,0.18);
}

/* hover */

.analytics-card:hover .card-icon {

    transform: translateY(-6px) scale(1.04);

    border-color: rgba(255,255,255,0.18);
}

/* ===================================================== */
/* EXTRA ELEGANCE */
/* ===================================================== */

.analytics-card {

    min-height: 100%;
}

.analytics-card h3 {

    letter-spacing: -0.5px;
}

.analytics-card:hover {

    transform: translateY(-14px);

    box-shadow:
        0 35px 90px rgba(124,58,237,0.25);
}

/* animated border glow */

.analytics-card::after {

    content: '';

    position: absolute;

    inset: 0;

    border-radius: inherit;

    padding: 1px;

    background:
        linear-gradient(
            135deg,
            rgba(192,132,252,0.4),
            transparent,
            transparent
        );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

    opacity: 0;

    transition: 0.4s;
}

.analytics-card:hover::after {

    opacity: 1;
}

</style>
